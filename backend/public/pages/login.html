<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVSOLSTORE | Inicio de Sesión</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card fade-in">
      <div class="logo-wrapper">
        <img
          src="../assets/img/logo.png"
          alt="Logo IVSOLSTORE"
          class="logo slide-down"
          id="pictureLogo"
        />
      </div>

      <h1 class="titulo" id="lblTitulo">IVSOLSTORE</h1>

      <form class="login-form" id="loginForm">
        <div class="form-group">
         <label for="txtUsuario">Usuario o correo</label>
          <input type="text" id="txtUsuario" placeholder="Ingresá tu usuario o correo Gmail" />

        <div class="form-group">
          <label for="txtContrasena">Contraseña</label>
          <input
            type="password"
            id="txtContrasena"
            name="contrasena"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
          />
        </div>

        <div class="acciones">
          <button type="submit" id="btnAcceder" class="btn btn-acceder">
            Acceder
          </button>
<button type="button" class="forgot-password-btn" id="btnOlvideContrasena">
  ¿Olvidaste tu contraseña?
</button>
          <button type="button" id="btnSalir" class="btn btn-salir">
            Salir
          </button>
        </div>

        <p id="mensajeEstado" class="mensaje-estado"></p>

        <p id="lbBloqueoVisual" class="bloqueo-visual oculto"></p>
      </form>
    </section>
  </main>

  <script src="../js/modules/login/login.js"></script>
  <div class="recovery-overlay" id="recoveryOverlay">
  <div class="recovery-modal">
    <button type="button" class="recovery-close" id="btnCerrarRecuperacion">×</button>

    <h2>Recuperar contraseña</h2>
    <p>
      Ingrese su usuario o correo registrado. El sistema generará un código y abrirá Gmail
      para enviar la solicitud al gerente.
    </p>

    <label for="txtRecuperacionUsuario">Usuario o correo</label>
    <input
      type="text"
      id="txtRecuperacionUsuario"
      placeholder="Ejemplo: empleado1 o empleado1@gmail.com"
    />

    <button type="button" class="recovery-send-btn" id="btnEnviarRecuperacion">
      Redactar correo al gerente
    </button>

    <p class="recovery-message" id="recoveryMessage"></p>
  </div>
</div>
</body>
</html>
